name: Build documentation

on:
  push:
    branches:
      - main
      - doc-builder*
      - v*-release
      - release-*
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    uses: huggingface/doc-builder/.github/workflows/build_main_documentation.yml@a601280c0e9830f86ac8ecde75eeb3cf733e8bef # main
    with:
      commit_sha: ${{ github.sha }}
      package_path: kernels/kernels/
      package: kernels
      version_tag_suffix: "kernels/src/"
    secrets:
      hf_token: ${{ secrets.HF_DOC_BUILD_PUSH }}
