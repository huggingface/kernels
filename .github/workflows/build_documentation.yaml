name: Build documentation

on:
  push:
    branches:
      - main
      - doc-builder*
      - v*-release
      - release-*
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    uses: huggingface/doc-builder/.github/workflows/build_main_documentation.yml@e60a538eea9817ab312196d0d233604b01697265  # main (light installs, no custom container)
    with:
      commit_sha: ${{ github.sha }}
      package_path: kernels/kernels/
      package: kernels
      version_tag_suffix: "kernels/src/"
    secrets:
      hf_token: ${{ secrets.HF_DOC_BUILD_PUSH }}
