[general]
name = "relu-tvm-ffi"
version = 1
upstream = "https://github.com/huggingface/kernels/tree/main/examples/kernels/relu-tvm-ffi"

backends = [
    "cpu",
    "cuda",
    "xpu",
]

[tvm-ffi]
src = [
    "tvm-ffi-ext/tvm_ffi_binding.cpp",
]

[kernel.relu_cpu]
backend = "cpu"
src = ["relu_cpu/relu_cpu.cpp", "util.hh"]
depends = []

[kernel.relu_cuda]
backend = "cuda"
src = ["relu_cuda/relu.cu", "util.hh"]
depends = []

[kernel.relu_xpu]
backend = "xpu"
depends = ["torch"]
src = ["relu_xpu/relu.cpp", "util.hh"]
