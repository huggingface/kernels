name: "Biweekly kernels metrics report"

on:
  schedule:
    # 09:00 UTC on the 1st and 15th of every month (~biweekly).
    - cron: "0 9 1,15 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate graphs but do not post to Slack"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  report:
    name: Build and post metrics report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          python-version: "3.12"

      - name: Generate report and post to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN_METRICS }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID_METRICS }}
        run: |
          uv run --no-project scripts/report_kernels_metrics.py \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN_METRICS }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID_METRICS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n --arg ch "$SLACK_CHANNEL_ID" --arg url "$RUN_URL" \
            '{channel: $ch, text: (":x: *kernels metrics report failed* — <" + $url + "|view run logs>")}')
          curl -sf -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-type: application/json; charset=utf-8" \
            --data "$payload"