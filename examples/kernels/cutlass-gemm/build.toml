[general]
name = "cutlass-gemm"
version = 1
license = "Apache-2.0"
backends = [
    "cuda",
    "xpu",
]

[general.hub]
repo-id = "kernels-test/cutlass-gemm"

[torch]
src = [
    "torch-ext/torch_binding.cpp",
    "torch-ext/torch_binding.h",
]

[kernel.gemm_xpu]
backend = "xpu"
depends = [
    "torch",
    "sycl_tla",
]
src = ["gemm_sycl.cpp"]

[kernel.gemm]
backend = "cuda"
depends = [
    "torch",
    "cutlass_3_6",
]
src = ["gemm.cu"]
